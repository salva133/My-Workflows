name: Bump Build Number

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Get number of commits in this PR
        id: commit-count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr view ${{ inputs.pr_number }} --json commits --jq '.commits | length')
          echo "commit_count=$count" >> $GITHUB_OUTPUT
          echo "→ Found $count commits in PR #${{ inputs.pr_number }}"

      - name: Bump version + sync name & localization (dynamic keys)
        id: bump
        if: steps.commit-count.outputs.commit_count > 0
        run: |
          set -euo pipefail
          
          FILE=".metadata/metadata.json"
          if [[ ! -f "$FILE" ]]; then
            echo "❌ metadata.json not found"
            exit 1
          fi
          
          OLD_VERSION=$(jq -r '.version // "0.0.0"' "$FILE")
          SUPPORTED_GAME_VERSION=$(jq -r '.supported_game_version // "1.12.5"' "$FILE")
          
          if [[ ! $OLD_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $OLD_VERSION"
            exit 1
          fi
          
          echo "Supported game version from metadata: $SUPPORTED_GAME_VERSION"
          
          # === Find localization file (first one only) + build dynamic keys ===
          LOCALIZATION_FILE=""
          MOD_NAME=$(jq -r '.name // ""' "$FILE")
          PREFIX=""
          MOD_KEY=""
          MOD_DESC_KEY=""
          UPDATED=false
          
          for YAML_FILE in localization/english/*_mod_l_english.yml; do
            if [[ -f "$YAML_FILE" ]]; then
              LOCALIZATION_FILE="$YAML_FILE"
              BASENAME=$(basename "$YAML_FILE")
              PREFIX=${BASENAME%%_*}
              MOD_KEY="mod${PREFIX}"
              MOD_DESC_KEY="${MOD_KEY}_desc"
              
              echo "→ Detected filename prefix: '${PREFIX}' → using dynamic keys: ${MOD_KEY} and ${MOD_DESC_KEY}"
              
              MOD_NAME_EXTRACTED=$(sed -n "s/^[[:space:]]*${MOD_KEY}:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$YAML_FILE")
              if [[ -n "$MOD_NAME_EXTRACTED" ]]; then
                MOD_NAME="$MOD_NAME_EXTRACTED"
                echo "→ Mod name from localization (${MOD_KEY}): \"$MOD_NAME\""
              else
                echo "⚠️ Could not parse ${MOD_KEY} key — keeping current metadata name"
              fi
              break
            fi
          done
          
          # Bump version
          IFS='.' read -r major minor patch <<< "$OLD_VERSION"
          BUMP_BY=${{ steps.commit-count.outputs.commit_count }}
          new_patch=$((patch + BUMP_BY))
          NEW_VERSION="$major.$minor.$new_patch"
          
          echo "Bump: $OLD_VERSION → $NEW_VERSION (+$BUMP_BY)"
          
          # Update metadata.json
          jq --arg nv "$NEW_VERSION" --arg name "$MOD_NAME" '
            .version = $nv |
            if $name != "" then .name = $name else . end
          ' "$FILE" > tmp.json && mv tmp.json "$FILE"
          
          # === Update localization (awk = reliable \n handling) ===
          if [[ -n "$LOCALIZATION_FILE" && -f "$LOCALIZATION_FILE" ]]; then
            echo "→ Updating ${MOD_DESC_KEY} with Mod Version ($NEW_VERSION) and Game Version ($SUPPORTED_GAME_VERSION)"
            
            # Literal \n (single backslash in the string)
            NEW_DESC="Mod Version: ${NEW_VERSION}\\nGame Version: ${SUPPORTED_GAME_VERSION}"
            echo "DEBUG: Writing desc = \"${NEW_DESC}\""
            
            # Awk replacement — no escaping nightmares
            awk -v key="${MOD_DESC_KEY}" -v newdesc="${NEW_DESC}" '
              /^[[:space:]]*'"${key}"':/ {
                sub(/"[^"]*"/, "\"" newdesc "\"")
                print
                next
              }
              { print }
            ' "$LOCALIZATION_FILE" > tmp.yml && mv tmp.yml "$LOCALIZATION_FILE"
            
            UPDATED=true
          else
            echo "ℹ️ No localization/english/*_mod_l_english.yml file found — skipping"
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "localization_file=$LOCALIZATION_FILE" >> $GITHUB_OUTPUT

      - name: Commit & Push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .metadata/metadata.json
          
          LOCALIZATION_FILE="${{ steps.bump.outputs.localization_file }}"
          if [[ -n "$LOCALIZATION_FILE" && -f "$LOCALIZATION_FILE" ]]; then
            git add "$LOCALIZATION_FILE"
          fi
          
          if git diff --staged --quiet; then
            echo "No changes needed → Version remains the same"
            exit 0
          fi
          
          git commit -m "ci: bump patch by ${{ steps.commit-count.outputs.commit_count }} → ${{ steps.bump.outputs.new_version }}"
          git push

name: Bump Build Number

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Get number of commits in this PR
        id: commit-count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr view ${{ inputs.pr_number }} --json commits --jq '.commits | length')
          echo "commit_count=$count" >> $GITHUB_OUTPUT
          echo "→ Found $count commits in PR #${{ inputs.pr_number }}"

      - name: Bump version by commit count
        id: bump
        if: steps.commit-count.outputs.commit_count > 0
        run: |
          set -euo pipefail
          
          FILE=".metadata/metadata.json"
          if [[ ! -f "$FILE" ]]; then
            echo "❌ metadata.json not found"
            exit 1
          fi
          
          OLD_VERSION=$(jq -r '.version // "0.0.0"' "$FILE")
          if [[ ! $OLD_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $OLD_VERSION"
            exit 1
          fi
          
          IFS='.' read -r major minor patch <<< "$OLD_VERSION"
          BUMP_BY=${{ steps.commit-count.outputs.commit_count }}
          new_patch=$((patch + BUMP_BY))
          NEW_VERSION="$major.$minor.$new_patch"
          
          echo "Bump: $OLD_VERSION → $NEW_VERSION (+$BUMP_BY)"
          
          # Update metadata.json
          jq --arg nv "$NEW_VERSION" '.version = $nv' "$FILE" > tmp.json && mv tmp.json "$FILE"
          
          # === Localization version bump (optional + first file only) ===
          echo "Checking localization files..."
          LOCALIZATION_FILE=""
          UPDATED=false
          
          for YAML_FILE in localization/english/*_mod_l_english.yml; do
            if [[ -f "$YAML_FILE" ]]; then
              LOCALIZATION_FILE="$YAML_FILE"
              echo "→ Updating Mod Version in: $YAML_FILE"
              sed -i "s/Mod Version: [0-9]\+\.[0-9]\+\.[0-9]\+/Mod Version: $NEW_VERSION/" "$YAML_FILE"
              UPDATED=true
              break   # ← STOP after the first file (as requested)
            fi
          done
          
          if [[ "$UPDATED" == false ]]; then
            echo "ℹ️ No localization/english/*_mod_l_english.yml file found — skipping"
          else
            echo "✅ Localization file updated: $LOCALIZATION_FILE"
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit & Push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .metadata/metadata.json
          
          # Add only the exact localization file we updated (or nothing)
          if [[ -n "$LOCALIZATION_FILE" && -f "$LOCALIZATION_FILE" ]]; then
            git add "$LOCALIZATION_FILE"
          fi
          
          if git diff --staged --quiet; then
            echo "No changes needed → Version remains the same"
            exit 0
          fi
          
          git commit -m "ci: bump patch by ${{ steps.commit-count.outputs.commit_count }} → ${{ steps.bump.outputs.new_version }}"
          git push

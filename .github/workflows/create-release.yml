name: Create Release

on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string
      pr_number:
        required: true
        type: number
      pr_body:
        required: false
        type: string
        default: ''

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming convention
        id: validate
        run: |
          branch="${{ inputs.branch_name }}"
          if [[ "$branch" =~ ^R[0-9]{2}($|-|/) ]]; then
            echo "should_create=true" >> $GITHUB_OUTPUT
            echo "✅ Branch-Name entspricht der Konvention: $branch"
          else
            echo "should_create=false" >> $GITHUB_OUTPUT
            echo "::notice title=Release Creation Skipped::"
            echo "Branch '$branch' entspricht **nicht** der Namenskonvention."
            echo "Erlaubte Formate: R01, R02, R03…, R99, R01-feature, R99/hotfix etc."
            echo "→ Release wird **nicht** erstellt."
          fi

      - name: Checkout code
        if: steps.validate.outputs.should_create == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Release
        if: steps.validate.outputs.should_create == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.branch_name }}"
          name: ${{ inputs.branch_name }}
          body: |
            Automated release from branch **${{ inputs.branch_name }}**
            
            Merged into `master` via PR #${{ inputs.pr_number }}
            
            ${{ inputs.pr_body }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
